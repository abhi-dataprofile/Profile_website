<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono','Space Grotesk',monospace">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E0A458"/><stop offset="1" stop-color="#5BC0BE"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5BC0BE"/>
    </marker>
    <marker id="arrowA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E0A458"/>
    </marker>
    <style>
      .lane{fill:#1A1D26;stroke:#2A2E3A;rx:14}
      .box{fill:#21242F;stroke:#2A2E3A;stroke-width:1.2;rx:11}
      .boxA{fill:#21242F;stroke:#E0A458;stroke-width:1.4;rx:11}
      .boxT{fill:#21242F;stroke:#5BC0BE;stroke-width:1.4;rx:11}
      .t{fill:#E8E6E1;font-size:13px;font-weight:600}
      .s{fill:#8A8F9C;font-size:10.5px}
      .lane-k{fill:#5A5F6C;font-size:11px;letter-spacing:.18em}
      .edge{stroke:#5BC0BE;stroke-width:1.6;fill:none}
      .edgeA{stroke:#E0A458;stroke-width:1.6;fill:none}
      .title{fill:#E8E6E1;font-size:22px;font-weight:700;font-family:'Space Grotesk'}
    </style>
  </defs>

  <rect width="1180" height="760" fill="#12141A"/>
  <circle cx="34" cy="34" r="7" fill="url(#g)"/>
  <text x="50" y="40" class="title">Production RAG — system architecture</text>
  <text x="50" y="60" class="s" font-size="12">hybrid retrieval · RRF · cross-encoder rerank · grounded generation · Ragas eval gate</text>

  <!-- ===== INGESTION LANE (offline) ===== -->
  <rect x="30" y="90" width="1120" height="150" class="lane" rx="14"/>
  <text x="48" y="116" class="lane-k">INGESTION · OFFLINE</text>

  <rect x="48"  y="128" width="120" height="92" class="box" rx="11"/>
  <text x="108" y="166" class="t" text-anchor="middle">Sources</text>
  <text x="108" y="184" class="s" text-anchor="middle">pdf · md · url</text>

  <rect x="206" y="128" width="120" height="92" class="box" rx="11"/>
  <text x="266" y="160" class="t" text-anchor="middle">Loaders</text>
  <text x="266" y="178" class="s" text-anchor="middle">+ doc_id</text>
  <text x="266" y="192" class="s" text-anchor="middle">metadata</text>

  <rect x="364" y="128" width="120" height="92" class="box" rx="11"/>
  <text x="424" y="160" class="t" text-anchor="middle">Chunking</text>
  <text x="424" y="178" class="s" text-anchor="middle">recursive</text>
  <text x="424" y="192" class="s" text-anchor="middle">stable ids</text>

  <rect x="540" y="118" width="150" height="52" class="box" rx="11"/>
  <text x="615" y="142" class="t" text-anchor="middle">Embeddings</text>
  <text x="615" y="158" class="s" text-anchor="middle">text-embedding-3</text>

  <rect x="540" y="180" width="150" height="48" class="boxT" rx="11"/>
  <text x="615" y="203" class="t" text-anchor="middle">BM25 sparse</text>
  <text x="615" y="219" class="s" text-anchor="middle">lexical index</text>

  <rect x="730" y="118" width="150" height="52" class="boxA" rx="11"/>
  <text x="805" y="142" class="t" text-anchor="middle">Qdrant</text>
  <text x="805" y="158" class="s" text-anchor="middle">dense · cosine</text>

  <!-- ingestion edges -->
  <path class="edge" d="M168,174 H204" marker-end="url(#arrow)"/>
  <path class="edge" d="M326,174 H362" marker-end="url(#arrow)"/>
  <path class="edge" d="M484,160 H536" marker-end="url(#arrow)"/>
  <path class="edge" d="M484,188 H536" marker-end="url(#arrow)"/>
  <path class="edgeA" d="M690,144 H726" marker-end="url(#arrowA)"/>

  <!-- ===== QUERY LANE (online) ===== -->
  <rect x="30" y="262" width="1120" height="226" class="lane" rx="14"/>
  <text x="48" y="288" class="lane-k">QUERY · ONLINE · LangGraph</text>

  <rect x="48" y="356" width="110" height="64" class="box" rx="11"/>
  <text x="103" y="384" class="t" text-anchor="middle">Question</text>
  <text x="103" y="402" class="s" text-anchor="middle">user</text>

  <!-- retrieve node spanning both stores -->
  <rect x="196" y="312" width="150" height="150" class="boxA" rx="11"/>
  <text x="271" y="336" class="t" text-anchor="middle">01 Retrieve</text>
  <text x="271" y="354" class="s" text-anchor="middle">hybrid</text>
  <rect x="214" y="366" width="114" height="38" class="box" rx="8"/>
  <text x="271" y="389" class="s" text-anchor="middle">Qdrant top-k</text>
  <rect x="214" y="412" width="114" height="38" class="box" rx="8"/>
  <text x="271" y="435" class="s" text-anchor="middle">BM25 top-k</text>

  <rect x="384" y="356" width="120" height="64" class="box" rx="11"/>
  <text x="444" y="384" class="t" text-anchor="middle">RRF fusion</text>
  <text x="444" y="402" class="s" text-anchor="middle">rank merge</text>

  <rect x="542" y="356" width="140" height="64" class="boxT" rx="11"/>
  <text x="612" y="380" class="t" text-anchor="middle">02 Rerank</text>
  <text x="612" y="398" class="s" text-anchor="middle">Cohere x-encoder</text>

  <rect x="720" y="356" width="120" height="64" class="box" rx="11"/>
  <text x="780" y="380" class="t" text-anchor="middle">Prompt</text>
  <text x="780" y="398" class="s" text-anchor="middle">+ context</text>

  <rect x="878" y="356" width="120" height="64" class="boxA" rx="11"/>
  <text x="938" y="380" class="t" text-anchor="middle">03 Generate</text>
  <text x="938" y="398" class="s" text-anchor="middle">grounded LLM</text>

  <rect x="1020" y="356" width="112" height="64" class="box" rx="11"/>
  <text x="1076" y="380" class="t" text-anchor="middle">Answer</text>
  <text x="1076" y="398" class="s" text-anchor="middle">SSE + cites</text>

  <!-- query edges -->
  <path class="edgeA" d="M158,388 H194" marker-end="url(#arrowA)"/>
  <path class="edge" d="M346,388 H382" marker-end="url(#arrow)"/>
  <path class="edge" d="M504,388 H540" marker-end="url(#arrow)"/>
  <path class="edge" d="M682,388 H718" marker-end="url(#arrow)"/>
  <path class="edgeA" d="M840,388 H876" marker-end="url(#arrowA)"/>
  <path class="edge" d="M998,388 H1018" marker-end="url(#arrow)"/>

  <!-- links to stores from retrieve -->
  <path class="edgeA" d="M805,170 V300 H271 V310" stroke-dasharray="4 4" marker-end="url(#arrowA)"/>
  <path class="edgeT edge" d="M615,228 V302 H273" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- ===== EVALUATION LANE ===== -->
  <rect x="30" y="510" width="730" height="220" class="lane" rx="14"/>
  <text x="48" y="536" class="lane-k">EVALUATION · CI GATE · Ragas</text>

  <rect x="48" y="556" width="120" height="60" class="box" rx="11"/>
  <text x="108" y="582" class="t" text-anchor="middle">Eval set</text>
  <text x="108" y="600" class="s" text-anchor="middle">q + ground truth</text>

  <rect x="48" y="640" width="120" height="60" class="box" rx="11"/>
  <text x="108" y="666" class="t" text-anchor="middle">Pipeline run</text>
  <text x="108" y="684" class="s" text-anchor="middle">answer+context</text>

  <rect x="220" y="556" width="240" height="144" class="boxT" rx="11"/>
  <text x="340" y="582" class="t" text-anchor="middle">Ragas metrics</text>
  <rect x="236" y="596" width="100" height="42" class="box" rx="8"/>
  <text x="286" y="615" class="s" text-anchor="middle">faithfulness</text>
  <text x="286" y="629" class="s" text-anchor="middle">≥ 0.85</text>
  <rect x="344" y="596" width="100" height="42" class="box" rx="8"/>
  <text x="394" y="615" class="s" text-anchor="middle">answer rel.</text>
  <text x="394" y="629" class="s" text-anchor="middle">≥ 0.80</text>
  <rect x="236" y="646" width="100" height="42" class="box" rx="8"/>
  <text x="286" y="665" class="s" text-anchor="middle">ctx precision</text>
  <text x="286" y="679" class="s" text-anchor="middle">≥ 0.70</text>
  <rect x="344" y="646" width="100" height="42" class="box" rx="8"/>
  <text x="394" y="665" class="s" text-anchor="middle">ctx recall</text>
  <text x="394" y="679" class="s" text-anchor="middle">report</text>

  <rect x="510" y="600" width="230" height="56" class="boxA" rx="11"/>
  <text x="625" y="624" class="t" text-anchor="middle">Gate → exit code</text>
  <text x="625" y="641" class="s" text-anchor="middle">block deploy on regression</text>

  <path class="edge" d="M168,586 H218" marker-end="url(#arrow)"/>
  <path class="edge" d="M168,670 H218 V640" marker-end="url(#arrow)"/>
  <path class="edgeA" d="M460,628 H508" marker-end="url(#arrowA)"/>

  <!-- ===== SERVING LANE ===== -->
  <rect x="790" y="510" width="360" height="220" class="lane" rx="14"/>
  <text x="808" y="536" class="lane-k">SERVING &amp; OPS</text>

  <rect x="808" y="556" width="150" height="60" class="boxA" rx="11"/>
  <text x="883" y="582" class="t" text-anchor="middle">FastAPI</text>
  <text x="883" y="600" class="s" text-anchor="middle">/query /ingest /eval</text>

  <rect x="980" y="556" width="150" height="60" class="box" rx="11"/>
  <text x="1055" y="582" class="t" text-anchor="middle">Console UI</text>
  <text x="1055" y="600" class="s" text-anchor="middle">live pipeline rail</text>

  <rect x="808" y="640" width="150" height="60" class="box" rx="11"/>
  <text x="883" y="666" class="t" text-anchor="middle">JSON logs</text>
  <text x="883" y="684" class="s" text-anchor="middle">+ LangSmith</text>

  <rect x="980" y="640" width="150" height="60" class="boxT" rx="11"/>
  <text x="1055" y="666" class="t" text-anchor="middle">Docker</text>
  <text x="1055" y="684" class="s" text-anchor="middle">api + qdrant</text>

  <path class="edge" d="M958,586 H978" marker-end="url(#arrow)"/>
</svg>
